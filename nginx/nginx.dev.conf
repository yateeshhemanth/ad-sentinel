worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Upstreams — uses Podman's aardvark-dns via /etc/resolv.conf ──
    # No custom resolver needed; container names resolve via the
    # default nameserver injected into each container by Podman.
    upstream backend_api {
        server adsentinel-api:4000;
        keepalive 4;
    }

    upstream frontend_app {
        server adsentinel-ui:80;
        keepalive 4;
    }

    server {
        listen 80;
        server_name _;
        add_header X-Env "development" always;

        location /api/auth/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    30s;
        }

        location /api/ {
            proxy_pass         http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 5s;
            proxy_read_timeout    120s;
        }

        location /reports/ {
            alias /var/www/reports/;
            add_header Content-Disposition attachment;
        }

        location /uploads/logos/ {
            alias /usr/share/nginx/html/uploads/logos/;
            expires 1m;
        }

        # SPA catch-all
        location / {
            proxy_pass         http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_connect_timeout 5s;
        }
    }
}
