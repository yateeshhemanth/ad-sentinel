version: "3.9"

services:

  postgres:
    environment:
      POSTGRES_DB:       adsentinel
      POSTGRES_USER:     adsentinel
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adsentinel_changeme}
    env_file: .env.prod
    restart: always

  redis:
    env_file: .env.prod
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_changeme}
    restart: always

  backend:
    env_file: .env.prod
    restart: always

  frontend:
    env_file: .env.prod
    restart: always

  nginx:
    env_file: .env.prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - report_output:/var/www/reports:ro
    restart: always
