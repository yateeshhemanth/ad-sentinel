version: "3.9"

services:

  postgres:
    # Override env directly — Podman needs environment: block on the service
    # to guarantee POSTGRES_* vars reach the postgres init scripts
    environment:
      POSTGRES_DB:       adsentinel
      POSTGRES_USER:     adsentinel
      POSTGRES_PASSWORD: dev_password_123
    env_file: .env.dev
    ports:
      - "5432:5432"

  redis:
    env_file: .env.dev
    command: redis-server --requirepass dev_redis_password

  backend:
    env_file: .env.dev
    command: node server.js

  frontend:
    env_file: .env.dev

  nginx:
    env_file: .env.dev
    ports:
      - "8085:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - report_output:/var/www/reports:ro
